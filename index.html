<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">

    <title>Herman Harazha — Links</title>

    <link rel="icon" href="/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/icon.png">

    <meta name="description" content="Herman Harazha — Links">
    <meta name="keywords" content="Herman Harazha, Geragaraza">
    <meta name="author" content="Herman Harazha">
    <meta name="theme-color" content="#000000">
    <link rel="canonical" href="https://geragaraza.com/">

    <meta property="og:title" content="Herman Harazha — Links">
    <meta property="og:description" content="Herman Harazha — Links">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://geragaraza.com/">
    <meta property="og:image" content="https://geragaraza.com/preview.png">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Herman Harazha">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Herman Harazha — Links">
    <meta name="twitter:description" content="Herman Harazha — Links">
    <meta name="twitter:image" content="https://geragaraza.com/preview.png">

    <link rel="dns-prefetch" href="https://www.tiktok.com">
    <link rel="dns-prefetch" href="https://www.instagram.com">
    <link rel="dns-prefetch" href="https://www.threads.com">
    <link rel="dns-prefetch" href="https://www.youtube.com">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Herman Harazha",
        "url": "https://geragaraza.com",
        "email": "mailto:geragaraza@gmail.com",
        "sameAs": [
            "https://www.tiktok.com/@geragaraza",
            "https://www.instagram.com/geragaraza",
            "https://www.youtube.com/@geragaraza",
            "https://www.threads.com/@geragaraza"
        ]
    }
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: clamp(48px, 12vh, 120px) 20px 20px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .avatar {
            width: clamp(88px, 20vw, 128px);
            height: clamp(88px, 20vw, 128px);
            border-radius: 50%;
            background: #fff;
            margin-bottom: 20px;
            cursor: pointer;
        }

        h1 {
            font-size: clamp(32px, 9vw, 64px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 8px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        a:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.3);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .email {
            display: block;
            text-align: center;
            white-space: nowrap;
            font-size: clamp(17px, 5vw, 34px);
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #0093ff;
            padding: 6px 16px;
            margin-bottom: clamp(24px, 5vh, 48px);
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .social {
            display: block;
            text-align: center;
            white-space: nowrap;
            font-size: clamp(17px, 5vw, 34px);
            font-weight: 700;
            letter-spacing: -0.02em;
            padding: 6px 16px;
        }

        .tiktok    { color: #fd2c55; }
        .instagram { color: #84a1ff; }
        .youtube   { color: #ff0032; }
        .threads   { color: #f2f4f6; }

        @media (hover: hover) and (pointer: fine) {
            .email:hover     { color: #fff; }
            .tiktok:hover    { color: #fefefe; }
            .instagram:hover { color: #f5f5f5; }
            .youtube:hover   { color: #fff; }
            .threads:hover   { color: #fff; }
        }

        .avatar:active, h1:active, .email:active, .social:active { opacity: 0.7; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .avatar-full {
            width: min(70vmin, 500px);
            height: min(70vmin, 500px);
            border-radius: 50%;
            background: #fff;
            transform: scale(0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .overlay.open .avatar-full {
            transform: scale(1);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0s !important;
                animation-duration: 0s !important;
            }
        }
    </style>
</head>
<body>
    <div class="avatar" id="avatar"></div>
    <h1 id="name">Herman Harazha</h1>
    <a href="mailto:geragaraza@gmail.com" class="email">geragaraza@gmail.com</a>
    <nav aria-label="Social links">
        <a href="https://www.tiktok.com/@geragaraza" class="social tiktok" target="_blank" rel="noopener noreferrer">tiktok.com/@geragaraza</a>
        <a href="https://www.instagram.com/geragaraza" class="social instagram" target="_blank" rel="noopener noreferrer">instagram.com/geragaraza</a>
        <a href="https://www.youtube.com/@geragaraza" class="social youtube" target="_blank" rel="noopener noreferrer">youtube.com/@geragaraza</a>
        <a href="https://www.threads.com/@geragaraza" class="social threads" target="_blank" rel="noopener noreferrer">threads.com/@geragaraza</a>
    </nav>
    <div class="overlay" id="overlay">
        <div class="avatar-full"></div>
    </div>
    <script>
        var overlay = document.getElementById('overlay');
        document.getElementById('avatar').addEventListener('click', function () {
            overlay.classList.add('open');
        });
        overlay.addEventListener('click', function () {
            overlay.classList.remove('open');
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') overlay.classList.remove('open');
        });
        document.getElementById('name').addEventListener('click', function () {
            navigator.clipboard?.writeText('Herman Harazha').catch(function () {});
        });
        document.querySelector('.email')?.addEventListener('click', function () {
            navigator.clipboard?.writeText('geragaraza@gmail.com').catch(function () {});
        });
    </script>
</body>
</html>
